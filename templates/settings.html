<!DOCTYPE html>
<html>
<head>
    <title>Settings - Routine Battle</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>
<body>

<div class="container">

    <div class="settings-card">

        <div class="settings-header">
            <h1>⚙️ Account Settings</h1>
            <p>Manage your profile information</p>
        </div>

        <form method="POST">

            <div class="input-group">
                <label>Username</label>
                <input
                    type="text"
                    name="username"
                    value="{{ user['username'] }}"
                    required
                >
            </div>

            <div class="input-group">
                <label>Email</label>
                <input
                    type="email"
                    name="email"
                    value="{{ user['email'] }}"
                    required
                >
            </div>

            <div class="settings-actions">

                <button
                    type="submit"
                    class="save-btn"
                >
                    💾 Save Changes
                </button>

                <a
                    href="/dashboard"
                    class="back-btn"
                >
                    ← Back
                </a>

            </div>

        </form>

        <hr style="margin:30px 0;">

        <div class="settings-header">
            <h2>🔒 Security</h2>
            <p>Change your password</p>
        </div>

        <form method="POST" action="/change-password">

            <div class="input-group">
                <label>Current Password</label>
                <input
                    type="password"
                    name="current_password"
                    required
                >
            </div>

            <div class="input-group">
                <label>New Password</label>
                <input
                    type="password"
                    name="new_password"
                    required
                >
            </div>

            <button
                type="submit"
                class="save-btn"
            >
                🔒 Update Password
            </button>

        </form>

    </div>

</div>

</body>
</html>
