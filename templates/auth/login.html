<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Login | Routine Battle</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

</head>

<body>

    <div class="auth-container">

        <div class="auth-left">

            <h1>
                Welcome Back 👋
            </h1>

            <p>
                Track your routines,
                build streaks,
                and compete with friends.
            </p>

            <img
                src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                alt=""
            >

        </div>

        <div class="auth-right">

            <div class="auth-card">

                <h2>
                    Login
                </h2>

                <form method="POST">

                    <input
                        type="text"
                        name="identifier"
                        placeholder="Username or Email"
                        required
                    >

                    <input
                        type="password"
                        name="password"
                        placeholder="Password"
                        required
                    >

                    <button type="submit">
                        Login
                    </button>

                </form>

                <p class="auth-link">

                    Don't have an account?

                    <a href="/register">
                        Register
                    </a>

                </p>

            </div>

        </div>

    </div>

</body>

</html>
